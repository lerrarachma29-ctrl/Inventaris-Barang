<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokSimpel - Sistem Inventaris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
         import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

          // Ganti dengan konfigurasi Firebase Anda
       const firebaseConfig = {
  apiKey: "AIzaSyDoIE-vXiF36CrZIWkcazGHcdXJhd1KmY8",
  authDomain: "inventaris-barang-11fc2.firebaseapp.com",
  databaseURL: "https://inventaris-barang-11fc2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "inventaris-barang-11fc2",
  storageBucket: "inventaris-barang-11fc2.firebasestorage.app",
  messagingSenderId: "217265916504",
  appId: "1:217265916504:web:03485624c55a0ac7d2182d",
  measurementId: "G-X6G92P4RP2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert("Login gagal: " + error.message);
            }
        };

        window.register = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Akun berhasil dibuat! Silakan klik Masuk.");
            } catch (error) { alert("Gagal daftar: " + error.message); }
        };

        window.resetPassword = async () => {
            const email = document.getElementById('login-email').value;
            if (!email) { alert("Masukkan email Anda terlebih dahulu di kolom email."); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Email pemulihan kata sandi telah dikirim ke " + email);
            } catch (error) { alert("Gagal mengirim email reset: " + error.message); }
        };

        window.logout = () => signOut(auth);

        window.tambahBarang = async (nama, stok) => {
    const user = auth.currentUser;
    if (!user) return alert("Anda harus login!");

    // Path ini memastikan data hanya masuk ke folder user yang sedang login
    const path = collection(db, "users", user.uid, "inventory");
    
    try {
        await addDoc(path, {
            namaBarang: nama,
            stokBarang: stok,
            dibuatPada: new Date()
        });
        alert("Barang berhasil ditambahkan!");
    } catch (e) {
        alert("Gagal: " + e.message);
    }
};

        window.muatDataBarang = () => {
    const user = auth.currentUser;
    if (!user) return;

    // Membaca hanya dari "kamar" user yang sedang login
    const q = query(collection(db, "users", user.uid, "inventory"));
    
    onSnapshot(q, (snapshot) => {
        const listBarang = snapshot.docs.map(doc => ({
            id: doc.id, 
            ...doc.data()
        }));
        
        console.log("Data barang saya:", listBarang);
        // Di sini Anda bisa memanggil fungsi render untuk menampilkan listBarang ke layar
    });
};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                
                // Pastikan listener untuk data inventaris dipanggil di sini
                onSnapshot(query(collection(db, "users", user.uid, "inventory")), (snap) => {
                    window.state.inventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                });
            } else {
                document.getElementById('app').classList.add('hidden');
                document.getElementById('login-page').classList.remove('hidden');
            }
        });
       
    </script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-100 text-center">
            <div class="bg-red-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-red-200"><i data-lucide="package" class="text-white" size="32"></i></div>
            <h1 class="text-2xl font-bold mb-1">StokSimpel</h1>
            <p class="text-slate-400 text-sm mb-8">Silakan masuk untuk melanjutkan</p>
            <div class="space-y-4 text-left">
                <input id="login-email" type="email" placeholder="Email" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500">
                <button onclick="login()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">Masuk</button>
                <button onclick="register()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition">Daftar Akun Baru</button>
                 <button onclick="resetPassword()" class="text-sm text-red-600 hover:underline">Lupa Password?</button>
            </div>
        </div>
    </div>

    <div id="app" class="flex min-h-screen hidden">
        <aside class="w-64 bg-slate-900 text-white flex flex-col p-6 shadow-xl sticky top-0 h-screen">
            <h1 class="text-xl font-bold mb-10 flex items-center gap-2">
                <div class="bg-red-600 p-1.5 rounded-lg"><i data-lucide="package" class="text-white"></i></div> StokSimpel
            </h1>
            <nav id="nav-sidebar" class="flex-1 space-y-2"></nav>
            <button onclick="logout()" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-red-900/30 text-red-400 transition">
                <i data-lucide="log-out" size="20"></i> Keluar
            </button>
            <div class="text-[10px] text-slate-500 mt-6">v1.4.2 | Powered by Firebase</div>
        </aside>

        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-8">
                <div><h2 id="tab-title" class="text-2xl font-bold">Ringkasan</h2></div>
                <div class="flex gap-4 items-center">
                    <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-lg border shadow-sm font-semibold text-sm">
                        <span id="current-time"></span>
                    </div>
                </div>
            </header>
            <div id="content-area" class="fade-in"></div>
        </main>
    </div>

    <div id="modal-container"></div>

    <script>
        let state = {
            activeTab: 'Log Aktivitas',
            inventory: [
                { id: 1, sku: 'SKU-SD01', name: 'Kertas HVS A4 80gr', category: 'ATK', quantity: 18, minStock: 10, source: 'BOS', image: '' },
                { id: 2, sku: 'SKU-SD02', name: 'Mouse Optik Bluetooth', category: 'Elektronik', quantity: 8, minStock: 3, source: 'Mandiri', image: '' }
            ],
            transactions: [
                { id: 101, productName: 'Kertas HVS A4 80gr', category: 'ATK', type: 'MASUK', qty: 50, note: 'Stok awal', date: '2026-06-03', image: '' }
            ],
            schoolProfile: { name: 'SD Negeri 01 Contoh', address: 'Jl. Pendidikan No. 1, Jakarta', npsn: '12345678' },
            transactionType: 'MASUK',
            editingId: null
        };

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}-${m}-${y}`;
        }

        function render() {
            renderNav();
            const contentArea = document.getElementById('content-area');
            document.getElementById('tab-title').innerText = state.activeTab;
            
            if (state.activeTab === 'Ringkasan') renderRingkasan(contentArea);
            else if (state.activeTab === 'Log Aktivitas') renderLog(contentArea);
            else if (state.activeTab === 'Data Produk') renderProduk(contentArea);
            else if (state.activeTab === 'Ekspor Laporan') renderExport(contentArea);
            else if (state.activeTab === 'Pengaturan') renderPengaturan(contentArea);
            
            lucide.createIcons();
        }

        function renderNav() {
            const nav = document.getElementById('nav-sidebar');
            const tabs = ['Ringkasan', 'Log Aktivitas', 'Data Produk', 'Ekspor Laporan', 'Pengaturan'];
            nav.innerHTML = tabs.map(t => `
                <button onclick="setActiveTab('${t}')" class="w-full flex items-center gap-3 p-3 rounded-xl transition ${state.activeTab === t ? 'bg-red-600' : 'hover:bg-slate-800'}">
                    <i data-lucide="${t === 'Ringkasan' ? 'layout-dashboard' : t === 'Log Aktivitas' ? 'activity' : t === 'Data Produk' ? 'package' : t === 'Ekspor Laporan' ? 'download' : 'settings'}" size="20"></i> ${t}
                </button>
            `).join('');
        }

        function renderProduk(container) {
            const categories = [...new Set(state.inventory.map(i => i.category))];
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="flex flex-col sm:flex-row gap-4">
                        <div class="relative flex-1">
                            <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400" size="18"></i>
                            <input id="search-input" class="w-full p-3 pl-10 rounded-xl border border-slate-200 focus:ring-2 focus:ring-red-200 outline-none" placeholder="Cari SKU atau nama produk..." oninput="updateTable()">
                        </div>
                        <select id="cat-filter" onchange="updateTable()" class="p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-red-200">
                            <option value="">Semua Kategori</option>
                            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                        <button onclick="openModal()" class="bg-red-600 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-red-700 transition">
                            <i data-lucide="plus" size="18"></i> Tambah Produk
                        </button>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
                        <table class="w-full">
                            <thead><tr class="text-left text-slate-400 uppercase text-xs border-b">
                                <th class="p-4">SKU</th><th class="p-4">NAMA PRODUK</th><th class="p-4">KATEGORI</th><th class="p-4">SUMBER DANA</th><th class="p-4">STOK</th><th class="p-4">LIMIT</th><th class="p-4 text-center">AKSI</th>
                            </tr></thead>
                            <tbody id="product-tbody"></tbody>
                        </table>
                    </div>
                </div>
            `;
            updateTable();
        }

        function updateTable() {
            const tbody = document.getElementById('product-tbody');
            const search = document.getElementById('search-input')?.value || '';
            const cat = document.getElementById('cat-filter')?.value || '';
            const filtered = state.inventory.filter(i => {
                const matchesSearch = i.name.toLowerCase().includes(search.toLowerCase()) || i.sku.toLowerCase().includes(search.toLowerCase());
                const matchesCat = cat === '' || i.category === cat;
                return matchesSearch && matchesCat;
            });
            tbody.innerHTML = filtered.map(i => `
                <tr class="border-t hover:bg-slate-50 transition">
                    <td class="p-4 font-bold text-sm">${i.sku}</td>
                    <td class="p-4 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center overflow-hidden">${i.image ? `<img src="${i.image}" class="w-full h-full object-cover">` : `<i data-lucide="package" size="16" class="text-slate-400"></i>`}</div>
                        ${i.name}
                    </td>
                    <td class="p-4 text-sm">${i.category}</td>
                    <td class="p-4 text-sm font-medium text-slate-600">${i.source || '-'}</td>
                    <td class="p-4 font-bold ${i.quantity <= i.minStock ? 'text-red-500' : ''}">${i.quantity}</td>
                    <td class="p-4 text-sm">${i.minStock}</td>
                    <td class="p-4 flex gap-2 justify-center">
                        <button onclick="openModal(${i.id})" class="p-2 hover:bg-blue-50 text-blue-500 rounded-lg"><i data-lucide="pencil" size="16"></i></button>
                        <button onclick="confirmDelete(${i.id})" class="p-2 hover:bg-red-50 text-red-500 rounded-lg"><i data-lucide="trash-2" size="16"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function confirmDelete(id) {
            const product = state.inventory.find(i => i.id === id);
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
                        <div class="bg-red-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600"><i data-lucide="alert-triangle" size="32"></i></div>
                        <h3 class="font-bold text-lg mb-2">Hapus Produk?</h3>
                        <p class="text-slate-500 text-sm mb-6">Anda yakin ingin menghapus <strong>${product.name}</strong>? Tindakan ini tidak dapat dibatalkan.</p>
                        <div class="flex gap-3">
                            <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold hover:bg-slate-200 transition">Batal</button>
                            <button onclick="deleteProduct(${id})" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold shadow-lg hover:bg-red-700 transition">Hapus</button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function openModal(id = null) {
            state.editingId = id;
            const p = id ? state.inventory.find(i => i.id === id) : {};
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                    <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 w-full max-w-lg animate-in fade-in zoom-in duration-200">
                        <h3 class="font-bold text-xl mb-6">${id ? 'Edit Data Produk' : 'Tambah Produk Baru'}</h3>
                        <div class="space-y-4">
                            <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">SKU</label><input id="form-sku" value="${p.sku || ''}" placeholder="Contoh: SKU-SD01" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">NAMA</label><input id="form-name" value="${p.name || ''}" placeholder="Contoh: Kertas HVS A4" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">KATEGORI</label><input id="form-cat" value="${p.category || ''}" placeholder="Contoh: ATK" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">SUMBER DANA</label><input id="form-source" value="${p.source || ''}" placeholder="Contoh: Dana BOS" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            <div class="grid grid-cols-2 gap-4">
                                 <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">STOK AWAL</label><input id="form-qty" value="${p.quantity || ''}" type="number" placeholder="Contoh: 100" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                                 <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">LIMIT MINIMAL</label><input id="form-min" value="${p.minStock || ''}" type="number" placeholder="Contoh: 10" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            </div>
                            <div class="relative pt-4">
                                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Foto Produk</label>
                                <div onclick="document.getElementById('img-upload').click()" class="cursor-pointer border-2 border-dashed border-slate-300 rounded-2xl p-6 flex flex-col items-center justify-center hover:border-red-500 hover:bg-red-50 transition group bg-slate-50">
                                    <img id="img-preview" src="${p.image || ''}" class="${p.image ? '' : 'hidden'} max-h-32 rounded-lg shadow-sm mb-2">
                                    <div id="img-placeholder" class="${p.image ? 'hidden' : 'text-center'}">
                                        <div class="bg-white p-3 rounded-full shadow-sm mb-2 inline-block"><i data-lucide="camera" class="text-slate-400 group-hover:text-red-500 transition" size="24"></i></div>
                                        <p class="text-xs font-bold text-slate-600">Ambil Foto / Unggah</p>
                                    </div>
                                </div>
                                <input type="file" id="img-upload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
                            </div>
                        </div>
                        <div class="mt-8 flex gap-3">
                            <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold hover:bg-slate-200 transition">Batal</button>
                            <button onclick="saveProduct()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold shadow-lg shadow-red-200 hover:bg-red-700 transition">Simpan Produk</button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('img-preview');
                    const placeholder = document.getElementById('img-placeholder');
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }
        function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
        function saveProduct() {
            const sku = document.getElementById('form-sku').value;
            const name = document.getElementById('form-name').value;
            const category = document.getElementById('form-cat').value;
            const source = document.getElementById('form-source').value;
            const image = document.getElementById('img-preview').src.startsWith('data') ? document.getElementById('img-preview').src : '';
            const quantity = parseInt(document.getElementById('form-qty').value);
            const minStock = parseInt(document.getElementById('form-min').value);
            if (state.editingId) {
                const p = state.inventory.find(i => i.id === state.editingId);
                Object.assign(p, { sku, name, category, source, image, quantity, minStock });
            } else {
                state.inventory.push({ id: Date.now(), sku, name, category, source, image, quantity, minStock });
            }
            closeModal();
            render();
        }
        function deleteProduct(id) { 
            state.inventory = state.inventory.filter(p => p.id !== id); 
            closeModal();
            render(); 
        }
        
        function renderRingkasan(container) {
            const totalStock = state.inventory.reduce((a,b)=>a+b.quantity, 0);
            const lowStockItems = state.inventory.filter(i => i.quantity <= i.minStock);
            
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    ${[
                        {t:'TOTAL JENIS', v: state.inventory.length, i:'package', bg:'bg-blue-50', iconBg:'bg-blue-600'}, 
                        {t:'TOTAL STOK', v: totalStock, i:'warehouse', bg:'bg-orange-50', iconBg:'bg-red-600'}, 
                        {t:'BARANG MASUK', v: state.transactions.filter(t=>t.type==='MASUK').length, i:'arrow-down', bg:'bg-emerald-50', iconBg:'bg-emerald-600'}, 
                        {t:'BARANG KELUAR', v: state.transactions.filter(t=>t.type==='KELUAR').length, i:'arrow-up', bg:'bg-rose-50', iconBg:'bg-rose-600'}
                    ].map(s => `
                        <div class="${s.bg} p-4 rounded-2xl flex items-center gap-4 border border-slate-100">
                            <div class="${s.iconBg} p-3 rounded-xl text-white"><i data-lucide="${s.i}" size="24"></i></div>
                            <div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${s.t}</p>
                                <p class="text-2xl font-bold text-slate-800">${s.v}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h3 class="font-bold text-slate-700 mb-6 flex items-center gap-2">
                            <i data-lucide="trending-up" class="text-blue-600" size="18"></i> Aliran Tren Barang (Minggu Ini)
                        </h3>
                        <div class="h-64">
                            <canvas id="stockChart"></canvas>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-slate-700 flex items-center gap-2">
                                <i data-lucide="alert-triangle" class="text-amber-500" size="18"></i> Peringatan Stok Menipis
                            </h3>
                            <span class="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-1 rounded-full">${lowStockItems.length} Produk</span>
                        </div>
                        <div class="flex-1 flex flex-col items-center justify-center text-center py-8">
                            ${lowStockItems.length > 0 ? lowStockItems.map(i => `
                                <div class="w-full text-left p-3 border border-red-100 bg-red-50 rounded-xl mb-2">
                                    <p class="font-bold text-sm text-slate-800">${i.name}</p>
                                    <p class="text-[10px] text-red-500 font-bold uppercase">Sisa: ${i.quantity} (Min: ${i.minStock})</p>
                                </div>
                            `).join('') : `
                                <div class="bg-emerald-50 p-4 rounded-full mb-4"><i data-lucide="check-circle" class="text-emerald-500" size="32"></i></div>
                                <p class="text-slate-400 text-sm italic">Semua stok aman & di atas batas minimum.</p>
                            `}
                        </div>
                    </div>
                </div>
            `;
            initDashboardChart();
            lucide.createIcons();
        }

        function initDashboardChart() {
            const ctx = document.getElementById('stockChart').getContext('2d');
            const dates = Array.from({length: 7}, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i));
                return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            });
            
            const dataMasuk = Array.from({length: 7}, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i));
                return state.transactions.filter(t => t.type === 'MASUK' && t.date === d.toISOString().split('T')[0]).length * 5;
            });
            const dataKeluar = Array.from({length: 7}, (_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i));
                return state.transactions.filter(t => t.type === 'KELUAR' && t.date === d.toISOString().split('T')[0]).length * 5;
            });
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [
                        { label: 'Barang Masuk', data: dataMasuk, backgroundColor: '#10b981', borderRadius: 6, barPercentage: 0.5 },
                        { label: 'Barang Keluar', data: dataKeluar, backgroundColor: '#f43f5e', borderRadius: 6, barPercentage: 0.5 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } } },
                    scales: { y: { beginAtZero: true, grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } }
                }
            });
        }

        function renderLog(container) {
            const today = new Date().toISOString().split('T')[0];
            const categories = [...new Set(state.inventory.map(i => i.category))];
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="bg-slate-900 p-6 rounded-2xl text-white shadow-lg">
                        <h3 class="font-bold text-sm mb-6 flex items-center gap-2"><i data-lucide="file-text" size="16"></i> Transaksi Baru</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">TIPE</label>
                                    <div class="flex gap-1">
                                        <button onclick="setTransactionType('MASUK')" class="flex-1 ${state.transactionType === 'MASUK' ? 'bg-emerald-600' : 'bg-slate-800'} py-2 rounded-lg font-bold text-[11px] transition">Masuk</button>
                                        <button onclick="setTransactionType('KELUAR')" class="flex-1 ${state.transactionType === 'KELUAR' ? 'bg-rose-600' : 'bg-slate-800'} py-2 rounded-lg font-bold text-[11px] transition">Keluar</button>
                                    </div>
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">TANGGAL</label>
                                    <input id="trans-date" type="date" value="${today}" class="w-full bg-slate-800 p-2 rounded-lg border-none text-[11px] outline-none [color-scheme:dark]"/>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">KATEGORI</label>
                                    <select id="trans-cat-input" onchange="updateProductDropdownInLog()" class="w-full bg-slate-800 p-2 rounded-lg border-none text-[11px] outline-none">
                                        <option value="">Pilih...</option>
                                        ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">PRODUK</label>
                                    <select id="trans-product-input" onchange="updateStockDisplay()" class="w-full bg-slate-800 p-2 rounded-lg border-none text-[11px] outline-none">
                                        <option value="">Pilih...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">QTY</label>
                                    <div class="flex items-center gap-3">
                                        <input id="trans-qty" type="number" class="w-full bg-slate-800 p-2 rounded-lg border-none text-[11px] outline-none" placeholder="0"/>
                                        <div id="stock-display" class="text-[10px] text-emerald-400 font-bold whitespace-nowrap">Stok: -</div>
                                    </div>
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">CATATAN</label>
                                    <input id="trans-note" type="text" class="w-full bg-slate-800 p-2 rounded-lg border-none text-[11px] outline-none" placeholder="Tambah keterangan..."/>
                                </div>
                                <div>
                                    <label class="text-[10px] text-slate-400 font-bold uppercase mb-1 block">FOTO</label>
                                    <button id="trans-btn-upload" onclick="document.getElementById('trans-img-upload').click()" class="w-full bg-slate-800 p-2 rounded-lg text-[11px] hover:bg-slate-700 flex items-center justify-center gap-2 transition">
                                        <i data-lucide="camera" size="14"></i> <span id="trans-btn-text">Unggah Foto</span>
                                    </button>
                                    <input type="file" id="trans-img-upload" class="hidden" accept="image/*" onchange="handleTransImage(event)">
                                    <input type="hidden" id="trans-img-data">
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 pt-6 border-t border-slate-800 flex justify-end">
                            <button onclick="saveTransaction()" class="bg-red-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-red-700 transition text-[11px]">Simpan Transaksi</button>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                            <h3 class="font-bold">Riwayat Terbaru</h3>
                            <div class="flex gap-2 w-full sm:w-auto">
                                <input id="log-search" oninput="renderTransactionTable()" class="flex-1 sm:w-40 px-4 py-2 border rounded-xl text-xs outline-none focus:ring-2 focus:ring-red-200" placeholder="Cari...">
                                <select id="log-cat-filter" onchange="updateLogProductFilter(); renderTransactionTable()" class="px-2 py-2 border rounded-xl text-xs outline-none focus:ring-2 focus:ring-red-200">
                                    <option value="">Semua Kat</option>
                                    ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                                </select>
                                <select id="log-prod-filter" onchange="renderTransactionTable()" class="px-2 py-2 border rounded-xl text-xs outline-none focus:ring-2 focus:ring-red-200">
                                    <option value="">Semua Prod</option>
                                </select>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead>
                                    <tr class="text-slate-400 border-b">
                                        <th class="p-3">Tanggal</th>
                                        <th class="p-3">Produk</th>
                                        <th class="p-3">Kategori</th>
                                        <th class="p-3">Tipe</th>
                                        <th class="p-3">Jumlah</th>
                                        <th class="p-3">Foto</th>
                                        <th class="p-3">Catatan</th>
                                    </tr>
                                </thead>
                                <tbody id="transaction-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            renderTransactionTable();
            lucide.createIcons();
        }

        function updateLogProductFilter() {
            const cat = document.getElementById('log-cat-filter').value;
            const prodSelect = document.getElementById('log-prod-filter');
            const filtered = cat ? state.inventory.filter(i => i.category === cat) : state.inventory;
            prodSelect.innerHTML = `<option value="">Semua Prod</option>` + filtered.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
        }

        function renderTransactionTable() {
            const tbody = document.getElementById('transaction-tbody');
            const search = document.getElementById('log-search')?.value.toLowerCase() || '';
            const cat = document.getElementById('log-cat-filter')?.value || '';
            const prod = document.getElementById('log-prod-filter')?.value || '';
            
            const filtered = state.transactions.filter(t => {
                const matchSearch = t.productName.toLowerCase().includes(search) || (t.note && t.note.toLowerCase().includes(search));
                const matchCat = cat ? t.category === cat : true;
                const matchProd = prod ? t.productName === prod : true;
                return matchSearch && matchCat && matchProd;
            });
            tbody.innerHTML = filtered.map(t => `
                <tr class="border-b">
                    <td class="p-3 text-slate-500">${formatDate(t.date)}</td>
                    <td class="p-3 font-semibold">${t.productName}</td>
                    <td class="p-3 text-xs uppercase font-bold text-slate-400">${t.category}</td>
                    <td class="p-3"><span class="${t.type==='MASUK' ? 'text-emerald-500' : 'text-rose-500'} font-bold">${t.type}</span></td>
                    <td class="p-3">${t.qty}</td>
                    <td class="p-3">${t.image ? `<img src="${t.image}" class="w-10 h-10 object-cover rounded-lg">` : '-'}</td>
                    <td class="p-3 italic text-slate-500">${t.note || '-'}</td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function handleTransImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('trans-img-data').value = e.target.result;
                    const btn = document.getElementById('trans-btn-upload');
                    const text = document.getElementById('trans-btn-text');
                    btn.classList.add('bg-emerald-800', 'border-emerald-600');
                    btn.classList.remove('bg-slate-800');
                    text.innerText = "Foto Terunggah";
                }
                reader.readAsDataURL(file);
            }
        }
        function updateProductDropdownInLog() {
            const cat = document.getElementById('trans-cat-input').value;
            const prodSelect = document.getElementById('trans-product-input');
            const filtered = cat ? state.inventory.filter(i => i.category === cat) : state.inventory;
            prodSelect.innerHTML = `<option value="">Pilih...</option>` + filtered.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            document.getElementById('stock-display').innerText = "Stok: -";
        }
        function updateStockDisplay() {
            const name = document.getElementById('trans-product-input').value;
            const display = document.getElementById('stock-display');
            const product = state.inventory.find(i => i.name === name);
            if (product) display.innerHTML = `Stok: <span class="font-bold text-white">${product.quantity}</span>`;
            else display.innerText = "Stok: -";
        }
        function saveTransaction() {
            const name = document.getElementById('trans-product-input').value;
            const qty = parseInt(document.getElementById('trans-qty').value);
            const date = document.getElementById('trans-date').value;
            const note = document.getElementById('trans-note').value;
            const category = document.getElementById('trans-cat-input').value;
            const image = document.getElementById('trans-img-data').value;
            if (!name || !qty || !date) return;
            const product = state.inventory.find(i => i.name === name);
            if (product) {
                if (state.transactionType === 'MASUK') product.quantity += qty;
                else product.quantity = Math.max(0, product.quantity - qty);
            }
            state.transactions.unshift({ id: Date.now(), productName: name, category, type: state.transactionType, qty, note, date, image });
            render();
        }

        function renderPengaturan(container) {
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="max-w-xl bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <h3 class="font-bold text-lg mb-6">Identitas Satuan Pendidikan</h3>
                        <div class="space-y-4">
                            <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Nama Sekolah</label><input id="sch-name" value="${state.schoolProfile.name}" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Alamat</label><input id="sch-addr" value="${state.schoolProfile.address}" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">NPSN</label><input id="sch-npsn" value="${state.schoolProfile.npsn}" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-red-500"></div>
                            <button onclick="saveProfile()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition">Simpan Profil</button>
                        </div>
                    </div>
                </div>
            `;
        }
        function saveProfile() {
            state.schoolProfile.name = document.getElementById('sch-name').value;
            state.schoolProfile.address = document.getElementById('sch-addr').value;
            state.schoolProfile.npsn = document.getElementById('sch-npsn').value;
            render();
        }

        function renderExport(container) {
            const categories = [...new Set(state.inventory.map(i => i.category))];
            container.innerHTML = `
                <div class="max-w-3xl bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="bg-red-100 p-4 rounded-2xl"><i data-lucide="download-cloud" class="text-red-600" size="28"></i></div>
                        <div>
                            <h3 class="font-bold text-xl text-slate-800">Pusat Ekspor Laporan</h3>
                            <p class="text-slate-500 text-sm">Konfigurasi dan unduh data inventaris atau riwayat transaksi.</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                        <div class="md:col-span-2 space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Judul Laporan</label><input id="rep-title" type="text" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 ring-red-100 outline-none" placeholder="Contoh: Laporan Inventaris Bulanan"></div>
                                <div><label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Nama Petugas</label><input id="rep-signatory" type="text" class="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 ring-red-100 outline-none" placeholder="Nama Anda"></div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Jenis Laporan</label>
                            <select id="rep-type" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 ring-red-100 outline-none">
                                <option value="stok">Daftar Stok Barang</option>
                                <option value="transaksi">Riwayat Keluar Masuk</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Kategori</label>
                            <select id="rep-cat" onchange="updateReportDropdown()" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 ring-red-100 outline-none">
                                <option value="">Semua Kategori</option>
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-400 mb-1 uppercase">Produk</label>
                            <select id="rep-prod" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:ring-2 ring-red-100 outline-none">
                                <option value="">Semua Produk</option>
                            </select>
                        </div>
                    </div>
                    <div class="pt-6 border-t border-slate-100 grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <button onclick="downloadReport('pdf')" class="bg-rose-600 text-white py-3 rounded-xl font-bold hover:bg-rose-700 transition flex items-center justify-center gap-2 text-sm shadow-md"><i data-lucide="file-text" size="16"></i> PDF</button>
                        <button onclick="downloadReport('excel')" class="bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition flex items-center justify-center gap-2 text-sm shadow-md"><i data-lucide="table" size="16"></i> Excel</button>
                        <button onclick="downloadReport('word')" class="bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2 text-sm shadow-md"><i data-lucide="file-spreadsheet" size="16"></i> Word</button>
                    </div>
                </div>
            `;
            updateReportDropdown();
            lucide.createIcons();
        }

        function updateReportDropdown() {
            const cat = document.getElementById('rep-cat').value;
            const prodSelect = document.getElementById('rep-prod');
            const filtered = cat ? state.inventory.filter(i => i.category === cat) : state.inventory;
            prodSelect.innerHTML = `<option value="">Semua Produk</option>` + filtered.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
        }

        function downloadReport(format) {
            const { headers, rows } = getFilteredData();
            const filename = `Laporan_${document.getElementById('rep-type').value}_${new Date().toISOString().split('T')[0]}`;
            
            if (format === 'pdf') {
                const title = document.getElementById('rep-title').value || "Laporan Inventaris";
                const signatory = document.getElementById('rep-signatory').value || "..........................";
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(18); doc.text(title, 105, 15, { align: 'center' });
                doc.setFontSize(10); doc.text(`Dicetak pada: ${new Date().toLocaleDateString()}`, 14, 22);
                doc.autoTable({ head: [headers], body: rows, startY: 30 });
                const finalY = doc.lastAutoTable.finalY + 20;
                doc.text("Petugas,", 170, finalY, { align: 'center' });
                doc.text(signatory, 170, finalY + 20, { align: 'center' });
                doc.save(`${filename}.pdf`);
            } else if (format === 'excel') {
                const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan");
                XLSX.writeFile(wb, `${filename}.xlsx`);
            } else if (format === 'word') {
                const htmlTable = `<html><head><meta charset="UTF-8"></head><body><h3>${document.getElementById('rep-title').value}</h3><table border="1"><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></body></html>`;
                const blob = new Blob(['\ufeff', htmlTable], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${filename}.doc`;
                a.click();
            }
        }
        
        function getFilteredData() {
            const type = document.getElementById('rep-type').value;
            const category = document.getElementById('rep-cat').value;
            const product = document.getElementById('rep-prod').value;
            if (type === 'stok') {
                const data = state.inventory.filter(i => { const catMatch = category ? i.category === category : true; const prodMatch = product ? i.name === product : true; return catMatch && prodMatch; });
                return { headers: ["SKU", "NAMA PRODUK", "KATEGORI", "STOK"], rows: data.map(i => [i.sku, i.name, i.category, i.quantity]) };
            } else {
                const data = state.transactions.filter(t => { const prodMatch = product ? t.productName === product : true; return prodMatch; });
                return { headers: ["PRODUK", "TIPE", "JUMLAH", "TANGGAL"], rows: data.map(t => [t.productName, t.type, t.qty, formatDate(t.date)]) };
            }
        }
        function setActiveTab(tab) { state.activeTab = tab; render(); }
        function setTransactionType(type) { state.transactionType = type; render(); }
        setInterval(() => { const el = document.getElementById('current-time'); if(el) el.innerText = new Date().toLocaleTimeString(); }, 1000);
        render();
    </script>
</body>
</html>
